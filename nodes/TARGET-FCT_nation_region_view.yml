        customSQL:
          customSQL: |-
            {{ stage('Override Create SQL') }}
            	CREATE OR REPLACE VIEW {{ ref('TARGET', 'FCT_nation_region')}} AS (
            		SELECT 
             `N_NATIONKEY` AS `N_NATIONKEY`,
             `N_NAME` AS `N_NAME`,
             `N_REGIONKEY` AS `N_REGIONKEY`,
             `N_COMMENT` AS `N_COMMENT`,
             `R_REGIONKEY` AS `R_REGIONKEY`,
             `R_NAME` AS `R_NAME`,
             `R_COMMENT` AS `R_COMMENT`
             FROM {{ ref('SRC', 'nation') }}
            INNER JOIN {{ ref('SRC', 'region') }} `region`
            ON {{ ref('SRC', 'nation') }}./*COLUMN*/ = `region`./*COLUMN*/
            	)
        dependencies:
          - locationName: SRC
            nodeName: nation
          - locationName: SRC
            nodeName: region
        join:
          joinCondition: |-
            FROM {{ ref('SRC', 'nation') }} `nation`
            INNER JOIN {{ ref('SRC', 'region') }} `region`
            ON `nation`.n_regionkey = `region`.r_regionkey
            WHERE `N_REGIONKEY` = 2
